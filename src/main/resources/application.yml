# Server - đổi port nếu 8080 bị chiếm (chỉ chạy 1 instance bot để tránh lỗi 409)
server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/milktea_db
    username: postgres
    # Mật khẩu DB: set trong .env (DB_PASSWORD) hoặc biến môi trường
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

# Bot & Admin: set trong .env (xem .env.example). Ứng dụng load .env từ thư mục gốc khi chạy.
telegram:
  bot:
    username: ${TELEGRAM_BOT_USERNAME:}
    token: ${TELEGRAM_BOT_TOKEN:}
    admin-chat-id: ${TELEGRAM_ADMIN_CHAT_ID:}